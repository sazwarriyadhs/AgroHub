services:
  postgres:
    image: postgres:15
    container_name: agrohub_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword123
      POSTGRES_DB: agrohub
    ports:
      - "5455:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agrohub_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: agrohub_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: agrohub_admin
      MINIO_ROOT_PASSWORD: CHANGE_THIS_STRONG_PASSWORD
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data: