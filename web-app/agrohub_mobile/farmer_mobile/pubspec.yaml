name: farmer_mobile
description: AgroHub Farmer Mobile Application - Connect Farmers to Markets
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # -----------------------------
  # STATE MANAGEMENT
  # -----------------------------
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # -----------------------------
  # NETWORKING
  # -----------------------------
  http: ^1.1.0
  dio: ^5.4.0
  http_parser: ^4.0.2

  # -----------------------------
  # DEPENDENCY INJECTION
  # -----------------------------
  get_it: ^7.6.7

  # -----------------------------
  # LOCAL STORAGE
  # -----------------------------
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # -----------------------------
  # UI / ANIMATION
  # -----------------------------
  lottie: ^2.7.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # -----------------------------
  # IMAGE / CAMERA
  # -----------------------------
  image_picker: ^1.0.5
  camera: ^0.10.5
  permission_handler: ^11.3.1

  # -----------------------------
  # DATE / TIME
  # -----------------------------
  intl: ^0.18.1

  # -----------------------------
  # ROUTING
  # -----------------------------
  go_router: ^13.0.0

  # -----------------------------
  # UTILITIES
  # -----------------------------
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.4
  uuid: ^4.3.3

  # -----------------------------
  # CHART
  # -----------------------------
  fl_chart: ^0.66.0

  # -----------------------------
  # REALTIME
  # -----------------------------
  web_socket_channel: ^2.4.0

  # -----------------------------
  # GEO / WEATHER
  # -----------------------------
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # -----------------------------
  # LIVE STREAM / YOUTUBE
  # -----------------------------
  youtube_player_iframe: ^5.1.2
  flutter_webrtc: ^0.11.0
  

  # -----------------------------
  # JSON SERIALIZATION
  # -----------------------------
  json_annotation: ^4.9.0

  # -----------------------------
  # ICONS
  # -----------------------------
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  build_runner: ^2.4.9
  json_serializable: ^6.7.1

flutter:

  uses-material-design: true

  assets:

    # folders
    - assets/logo/
    - assets/images/
    - assets/panen/
    - assets/menu/
    - assets/menu_icons/
    - assets/farmer/

    # animations
    - assets/scanning_animation.json
    - assets/upload_animation.json

  fonts:

    - family: Poppins
      fonts:

        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400

        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700