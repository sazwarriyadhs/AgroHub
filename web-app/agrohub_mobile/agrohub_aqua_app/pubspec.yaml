name: agrohub_aqua_app
description: AgroHub Aqua - Platform Perikanan Cerdas
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  dio: ^5.9.2
  flutter_secure_storage: ^9.2.2

  fl_chart: ^0.68.0

  image_picker: ^1.1.2

  intl: ^0.20.2
  qr_flutter: ^4.1.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # Logo directory
    - assets/logo/aqua.png
    
    # Images directory
    - assets/images/back_card.png
    - assets/images/card_bg.png
    - assets/images/fishery.png
    - assets/images/gmv.png
    - assets/images/header.png
    - assets/images/login.png
    - assets/images/nelayan.png
    - assets/images/splash.png
    
    # Menu icons directory
    - assets/menu/ai.png
    - assets/menu/health.png
    - assets/menu/jual.png
    - assets/menu/market.png
    - assets/menu/pakan.png
    - assets/menu/wallet.png