name: agrohub_herd_app
description: AgroHub Herd - Platform Peternakan Cerdas
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0
  share_plus: ^13.1.0
  http: ^1.6.0
  image_picker: ^1.2.2
  flip_card: ^0.7.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # Logo
    - assets/logo/herd.png
    
    # Images
    - assets/images/belakang.png
    - assets/images/depan.png
    - assets/images/header.png
    - assets/images/login.png
    - assets/images/splash.png
    
    # Badge
    - assets/badge/bronze.png
    - assets/badge/gold.png
    - assets/badge/silver.png
    
    # Icons folder (if any)
    - assets/icons/
